<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiserv Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
       
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
       
        h1 {
            color: #4a5568;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
       
        .badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: bold;
        }
       
        .ip-box {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 1.3em;
            color: #2d3748;
            font-weight: bold;
        }
       
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
       
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
       
        .btn-copy {
            background: #f39c12;
        }
       
        .btn-minecraft {
            background: #27ae60;
        }
       
        .btn-discord {
            background: #5865F2;
        }
       
        #status {
            margin-top: 20px;
            padding: 10px;
            background: #27ae60;
            color: white;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }
       
        .footer {
            margin-top: 30px;
            color: #718096;
            font-size: 0.9em;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
       
        .footer p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ MULTISERV</h1>
        <div class="badge">🌍 SERVEUR MONDIAL</div>
       
        <div class="ip-box" id="ipDisplay">
            147.185.221.17:12971
        </div>

        <button class="btn btn-copy" id="copyBtn">
            📋 COPIER L'IP
        </button>

        <button class="btn btn-minecraft" id="minecraftBtn">
            ⛏️ LANCER MINECRAFT
        </button>

        <button class="btn btn-discord" id="discordBtn">
            💬 DISCORD
        </button>

        <div id="status"></div>

        <div class="footer">
            <p>📱 Console : utilise MC Server Connector</p>
            <p>🐧 Linux : Minecraft doit être installé</p>
            <p>🌐 IP: 147.185.221.17:12971</p>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
